<!DOCTYPE html>
<html>
<head>
    <title>PUP Hymn</title>
    <!-- Link to the stylesheet that controls colors and layout -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ========== TOP HALF: Player Controls ========== -->
    <div class="top-half">

        <!-- School header: logo + title -->
        <div class="header-row">
            <img src="pup logo.png" alt="PUP Logo">
            <h1>Polytechnic University of the Philippines</h1>
        </div>

        <h2>PUP Hymn</h2>

        <!-- Shows the currently singing word -->
        <div class="marquee-box">
            <div id="lyric-display">~PUP Hymn~</div>
        </div>

        <!-- The audio file (hidden, controlled by buttons below) -->
        <audio id="hymn-audio">
            <source src="pup-hymn.mp3" type="audio/mpeg">
        </audio>

        <!-- Song progress: current time | seek bar | total time -->
        <div class="progress-container">
            <span id="current-time">0:00</span>
            <input type="range" id="progress-bar" min="0" max="100" value="0" step="0.1">
            <span id="total-time">0:00</span>
        </div>

        <!-- Playback buttons: Rewind | Play | Pause | Restart | Forward -->
        <div class="buttons">
            <button class="control-btn" onclick="rewindSong()"  title="Rewind 10 seconds">⏮</button>
            <button class="control-btn play-btn" onclick="startSong()"   title="Play">▶</button>
            <button class="control-btn" onclick="pauseSong()"   title="Pause">⏸</button>
            <button class="control-btn" onclick="restartSong()" title="Restart from beginning">↺</button>
            <button class="control-btn" onclick="forwardSong()" title="Forward 10 seconds">⏭</button>
        </div>

        <!-- Volume slider + Speed selector -->
        <div class="controls-row">

            <!-- Volume Control -->
            <div class="volume-control">
                <span>🕪</span>
                <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="1">
            </div>

            <!-- Playback Speed (custom dropdown to avoid browser default blue highlight) -->
            <div class="speed-control">
                <span>⚡︎</span>
                <div class="custom-select" id="speed-select">
                    <!-- This shows the currently selected speed -->
                    <div class="custom-select-selected" id="speed-selected">1x</div>
                    <!-- These are the speed options in the dropdown -->
                    <div class="custom-select-options" id="speed-options">
                        <div class="custom-option" data-value="0.5">0.5x</div>
                        <div class="custom-option" data-value="0.75">0.75x</div>
                        <div class="custom-option selected" data-value="1">1x</div>
                        <div class="custom-option" data-value="1.25">1.25x</div>
                        <div class="custom-option" data-value="1.5">1.5x</div>
                        <div class="custom-option" data-value="2">2x</div>
                    </div>
                </div>
            </div>

        </div>
    </div>
    <!-- ========== END TOP HALF ========== -->


    <!-- ========== BOTTOM HALF: Scrollable Lyrics ========== -->
    <!-- Words are built and injected here by script.js -->
    <div class="bottom-half">
        <div class="lyrics-box" id="lyrics-box"></div>
    </div>
    <!-- ========== END BOTTOM HALF ========== -->


    <!-- Load the JavaScript file that makes everything work -->
    <script src="script.js"></script>

</body>
</html>
